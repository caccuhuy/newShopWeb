<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArchitectLedger | Đỉnh Cao Công Nghệ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        .hero-gradient { background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%); }
        .product-card:hover .cart-btn { transform: translateY(0); opacity: 1; }
        .cart-btn { transform: translateY(10px); opacity: 0; transition: all 0.3s ease; }
    </style>
</head>
<body class="text-gray-900 bg-white">

    <header class="fixed w-full z-50 bg-white/80 backdrop-blur-md border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <div class="text-2xl font-bold text-[#3451B2] tracking-tight cursor-pointer" onclick="window.location.href='dashboard.html'">ArchitectLedger</div>
            
            <nav class="hidden md:flex items-center space-x-10 text-sm font-semibold text-gray-500">
                <a href="dashboard.html" class="text-[#3451B2] border-b-2 border-[#3451B2] pb-1">Home</a>
                <a href="#" class="hover:text-black transition-colors">Categories</a>
                <a href="customerLogin.html" class="hover:text-black transition-colors">Login</a>
            </nav>

            <div class="flex items-center space-x-5">
                <div class="relative hidden lg:block">
                    <input type="text" placeholder="Tìm kiếm sản phẩm..." class="bg-gray-100 rounded-full py-2 px-5 pl-10 text-xs w-64 focus:ring-2 focus:ring-blue-100 outline-none border-none transition-all">
                    <svg class="w-4 h-4 absolute left-4 top-2.5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                </div>
                <!-- NÚT GIỎ HÀNG CHUẨN -->
                <button class="cart-icon-btn relative p-2 text-gray-700 hover:text-[#3451B2]">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="1.5" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
                    <span class="cart-badge absolute top-1 right-1 bg-red-500 text-white text-[10px] w-4 h-4 flex items-center justify-center rounded-full" style="display: none;">0</span>
                </button>
            </div>
        </div>
    </header>

    <section class="relative pt-20 h-[600px] hero-gradient flex items-center">
        <div class="max-w-7xl mx-auto px-6 w-full grid md:grid-cols-2 gap-12 items-center">
            <div class="z-10 space-y-8">
                <span class="inline-block text-[11px] font-bold text-[#3451B2] uppercase tracking-[0.3em] bg-blue-50 px-4 py-1.5 rounded-full">Collection 2026</span>
                <h1 class="text-5xl lg:text-7xl font-extrabold leading-[1.1]">Mua sắm tẹt ga, <br><span class="text-[#3451B2]">không lo về giá</span></h1>
                <p class="text-gray-500 text-lg max-w-md">Khám phá hàng ngàn sản phẩm công nghệ mới nhất với mức giá hấp dẫn và nhiều ưu đãi đặc biệt.</p>
            </div>
            <div class="relative hidden md:flex justify-center items-center">
                <div class="absolute -top-10 -right-10 w-64 h-64 bg-[#3451B2]/10 rounded-full blur-3xl"></div>
                <div class="absolute -bottom-10 -left-10 w-48 h-48 bg-blue-200/20 rounded-full blur-2xl"></div>
                <img src="https://images.unsplash.com/photo-1616348436168-de43ad0db179?auto=format&fit=crop&q=80&w=1000" class="relative z-10 w-3/4 max-h-[450px] object-cover rounded-3xl shadow-2xl rotate-3 hover:rotate-0 transition-transform duration-700" alt="Hero Tech">
            </div>
        </div>
    </section>

    <section class="py-24 bg-gray-50/50">
        <div class="max-w-7xl mx-auto px-6">
            <h2 class="text-3xl font-bold text-center mb-16">Sản Phẩm Bán Chạy</h2>
            <div id="productGrid" class="grid grid-cols-2 lg:grid-cols-4 gap-8">
                <!-- Sản phẩm sẽ được đổ vào đây bởi dashboard.js -->
            </div>
        </div>
    </section>

    <script src="../assets/js/products_data.js"></script>
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/cart.js"></script>
    <script src="../assets/js/dashboard.js"></script>
</body>
</html>
