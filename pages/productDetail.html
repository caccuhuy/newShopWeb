<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết sản phẩm | ArchitectLedger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .active-tab { border-bottom: 2px solid #3451B2; color: #3451B2; }
    </style>
</head>
<body class="bg-[#f8f9fc] text-gray-900">

    <header class="bg-white border-b border-gray-100 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="text-xl font-bold text-[#3451B2] cursor-pointer" onclick="window.location.href='dashboard.html'">ArchitectLedger</div>
            <nav class="hidden md:flex space-x-8 text-sm font-medium text-gray-500">
                <a href="dashboard.html" class="hover:text-black transition-all">Home</a>
                <a href="customerLogin.html" class="hover:text-black transition-all">Login</a>
            </nav>
            <div class="flex items-center space-x-4">
                <button class="cart-icon-btn relative p-2 text-gray-700 hover:text-[#3451B2]">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="1.5" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
                    <span class="cart-badge absolute top-1 right-1 bg-red-500 text-white text-[10px] w-4 h-4 flex items-center justify-center rounded-full" style="display: none;">0</span>
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-12">
            
            <div class="lg:col-span-7">
                <div class="rounded-3xl overflow-hidden bg-white aspect-square shadow-sm border border-gray-100">
                    <img id="mainImage" src="" class="w-full h-full object-contain p-8" alt="Product Image">
                </div>
            </div>

            <div class="lg:col-span-5 space-y-8">
                <div>
                    <span id="brandLabel" class="text-[10px] font-bold text-[#3451B2] bg-blue-50 px-2 py-1 rounded uppercase tracking-widest">Brand</span>
                    <h1 id="productName" class="text-3xl font-black text-gray-900 mt-4 leading-tight">Loading...</h1>
                </div>

                <div class="bg-blue-50/50 p-6 rounded-2xl border border-blue-100">
                    <span id="productPrice" class="text-3xl font-black text-[#3451B2]">0đ</span>
                </div>

                <div class="space-y-6">
                    <div>
                        <label class="text-xs font-bold text-gray-400 uppercase tracking-widest block mb-3">Số lượng:</label>
                        <div class="flex items-center w-32 border-2 border-gray-100 rounded-xl overflow-hidden bg-white">
                            <button onclick="window.updateQty(-1)" class="w-10 h-10 flex items-center justify-center hover:bg-gray-50">-</button>
                            <input id="qty" type="number" value="1" class="w-12 text-center text-sm font-bold bg-transparent outline-none border-none">
                            <button onclick="window.updateQty(1)" class="w-10 h-10 flex items-center justify-center hover:bg-gray-50">+</button>
                        </div>
                    </div>
                </div>

                <button id="addCartBtn" class="w-full bg-[#3451B2] hover:bg-blue-800 text-white font-black py-5 rounded-2xl shadow-xl shadow-blue-100 transition-all transform active:scale-95 flex items-center justify-center gap-3">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
                    THÊM VÀO GIỎ HÀNG
                </button>
            </div>
        </div>

        <section class="mt-20">
            <h3 class="text-lg font-bold mb-8 border-b-2 border-[#3451B2] inline-block pb-2">Thông số kỹ thuật</h3>
            <div class="bg-white rounded-3xl shadow-sm border border-gray-100 overflow-hidden">
                <table class="w-full text-sm">
                    <tbody id="specsTable">
                        <tr class="border-b border-gray-50"><td class="p-5 font-bold text-gray-400 w-1/3 bg-gray-50/50 uppercase text-[10px]">Hệ điều hành</td><td class="p-5 text-gray-800">...</td></tr>
                        <tr class="border-b border-gray-50"><td class="p-5 font-bold text-gray-400 bg-gray-50/50 uppercase text-[10px]">RAM</td><td class="p-5 text-gray-800">...</td></tr>
                        <tr class="border-b border-gray-50"><td class="p-5 font-bold text-gray-400 bg-gray-50/50 uppercase text-[10px]">Bộ nhớ</td><td class="p-5 text-gray-800">...</td></tr>
                        <tr class="border-b border-gray-50"><td class="p-5 font-bold text-gray-400 bg-gray-50/50 uppercase text-[10px]">Dung lượng Pin</td><td class="p-5 text-gray-800">...</td></tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script>
        window.updateQty = (val) => {
            const input = document.getElementById('qty');
            let v = parseInt(input.value) + val;
            if(v >= 1) input.value = v;
        };
    </script>
    <script src="../assets/js/products_data.js"></script>
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/cart.js"></script>
    <script src="../assets/js/product-detail.js"></script>
</body>
</html>
