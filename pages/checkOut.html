<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thanh toán | ArchitectLedger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fc; }
        .step-active { background-color: #3451B2; color: white; }
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
    </style>
</head>
<body class="text-gray-900">

    <header class="bg-white border-b border-gray-100 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="text-xl font-bold text-[#3451B2] cursor-pointer" onclick="window.location.href='dashboard.html'">ArchitectLedger</div>
            <nav class="flex items-center space-x-6 text-sm font-medium text-gray-500">
                <a href="dashboard.html" class="hover:text-black">Home</a>
                <button class="cart-icon-btn relative p-2 text-[#3451B2]">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
                    <span class="cart-badge absolute top-1 right-1 bg-red-500 text-white text-[10px] w-4 h-4 flex items-center justify-center rounded-full" style="display: none;">0</span>
                </button>
            </nav>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-10">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- Cột trái: Thông tin khách hàng -->
            <div class="lg:col-span-7 space-y-8">
                <section class="bg-white rounded-2xl p-8 border border-gray-100 shadow-sm">
                    <h2 class="text-lg font-bold mb-8 flex items-center gap-2">
                        <span class="p-2 bg-blue-50 text-[#3451B2] rounded-lg">📍</span> Thông tin giao hàng
                    </h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <input type="text" id="custName" placeholder="Họ và tên" class="w-full px-4 py-3 rounded-xl border border-gray-100 outline-none focus:border-[#3451B2] text-sm">
                        <input type="text" id="custPhone" placeholder="Số điện thoại" class="w-full px-4 py-3 rounded-xl border border-gray-100 outline-none focus:border-[#3451B2] text-sm">
                        <input type="text" id="custAddress" placeholder="Địa chỉ chi tiết" class="md:col-span-2 w-full px-4 py-3 rounded-xl border border-gray-100 outline-none focus:border-[#3451B2] text-sm">
                    </div>
                </section>

                <!-- PHẦN PHƯƠNG THỨC THANH TOÁN ĐÃ ĐƯỢC KHÔI PHỤC -->
                <section class="bg-white rounded-2xl p-8 border border-gray-100 shadow-sm">
                    <div class="flex items-center space-x-3 mb-8">
                        <div class="p-2 bg-blue-50 text-[#3451B2] rounded-lg">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/></svg>
                        </div>
                        <h2 class="text-lg font-bold">Phương thức thanh toán</h2>
                    </div>

                    <div class="space-y-4">
                        <!-- Thẻ tín dụng -->
                        <div class="border-2 border-[#3451B2] rounded-xl p-4 cursor-pointer relative bg-blue-50/10">
                            <div class="flex items-center justify-between mb-6">
                                <div class="flex items-center space-x-4">
                                    <div class="w-5 h-5 border-4 border-[#3451B2] rounded-full"></div>
                                    <span class="text-sm font-bold">Thẻ tín dụng / Ghi nợ</span>
                                </div>
                                <div class="flex space-x-2">
                                    <img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Visa_Inc._logo.svg" class="h-4">
                                    <img src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Mastercard-logo.svg" class="h-4">
                                </div>
                            </div>
                            
                            <div class="grid grid-cols-2 gap-4">
                                <div class="col-span-2 space-y-2">
                                    <label class="text-[9px] font-bold text-gray-400 uppercase">Số thẻ</label>
                                    <input type="text" placeholder="0000 0000 0000 0000" class="w-full px-4 py-3 rounded-lg border border-gray-100 text-sm outline-none focus:border-[#3451B2]">
                                </div>
                                <div class="space-y-2">
                                    <label class="text-[9px] font-bold text-gray-400 uppercase">Hết hạn</label>
                                    <input type="text" placeholder="MM/YY" class="w-full px-4 py-3 rounded-lg border border-gray-100 text-sm outline-none focus:border-[#3451B2]">
                                </div>
                                <div class="space-y-2">
                                    <label class="text-[9px] font-bold text-gray-400 uppercase">CVV</label>
                                    <input type="password" placeholder="***" class="w-full px-4 py-3 rounded-lg border border-gray-100 text-sm outline-none focus:border-[#3451B2]">
                                </div>
                            </div>
                        </div>

                        <!-- Chuyển khoản -->
                        <div class="border border-gray-100 rounded-xl p-4 flex items-center justify-between hover:bg-gray-50 transition-colors cursor-pointer">
                            <div class="flex items-center space-x-4">
                                <div class="w-5 h-5 border-2 border-gray-200 rounded-full"></div>
                                <span class="text-sm font-semibold text-gray-600">Chuyển khoản ngân hàng</span>
                            </div>
                        </div>
                    </div>
                </section>
            </div>

            <!-- Cột phải: Giỏ hàng thực tế -->
            <div class="lg:col-span-5 space-y-6">
                <div class="bg-white rounded-2xl p-8 border border-gray-100 shadow-sm sticky top-24">
                    <div class="flex justify-between items-center mb-8">
                        <h2 class="text-lg font-bold">Tóm tắt đơn hàng</h2>
                        <button onclick="CartManager.clearCart()" class="text-[10px] font-bold text-red-500 uppercase tracking-widest hover:underline">Xóa tất cả</button>
                    </div>
                    
                    <!-- DANH SÁCH HÀNG THẬT SẼ ĐƯỢC ĐỔ VÀO ĐÂY -->
                    <div id="cartItemsList" class="space-y-6 mb-8 max-h-[400px] overflow-y-auto pr-2">
                        <p class="text-center text-gray-400 py-10">Đang tải giỏ hàng...</p>
                    </div>

                    <div class="border-t border-dashed border-gray-100 pt-6 space-y-3">
                        <div class="flex justify-between items-end pt-4">
                            <span class="text-gray-900 font-bold">Tổng thanh toán</span>
                            <div class="text-right">
                                <span id="finalTotal" class="block text-2xl font-black text-[#3451B2]">0đ</span>
                                <span class="text-[10px] text-gray-400 italic">Đã bao gồm VAT</span>
                            </div>
                        </div>
                    </div>

                    <button id="confirmCheckout" class="w-full bg-[#3451B2] hover:bg-blue-800 text-white font-black py-4 rounded-xl mt-8 shadow-lg shadow-blue-100 flex items-center justify-center space-x-3 transition-all transform active:scale-95">
                        <span>XÁC NHẬN THANH TOÁN</span>
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script src="../assets/js/products_data.js"></script>
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/cart.js"></script>
    <script src="../assets/js/checkout.js"></script>
</body>
</html>
