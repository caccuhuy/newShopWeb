<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập & Đăng ký | ArchitectLedger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass-effect { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(8px); }
        .transition-soft { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .hidden { display: none; }
    </style>
</head>
<body class="bg-[#f8f9fc] min-h-screen flex flex-col">

    <header class="flex items-center justify-between px-8 py-4 glass-effect border-b border-gray-100 sticky top-0 z-50">
        <div class="text-2xl font-bold text-[#3451B2] tracking-tight cursor-pointer" onclick="window.location.href='../index.html'">
            ArchitectLedger
        </div>
        <a href="staffLogin.html" class="text-xs font-bold text-gray-400 hover:text-[#3451B2] transition-soft uppercase tracking-widest">Portal Nhân Viên</a>
    </header>

    <main class="flex-grow flex items-center justify-center p-4 md:p-12">
        <div class="w-full max-w-5xl bg-white rounded-3xl shadow-xl flex flex-col md:flex-row overflow-hidden border border-gray-100">
            
            <section class="w-full md:w-1/2 bg-[#3451B2] p-12 text-white flex flex-col justify-center relative">
                <div class="relative z-10">
                    <h1 class="text-3xl lg:text-4xl font-extrabold leading-tight mb-6">Trải nghiệm mua sắm công nghệ đỉnh cao</h1>
                    <p class="text-blue-100 text-lg opacity-90 leading-relaxed">Tham gia cộng đồng ArchitectLedger để sở hữu những thiết bị điện thoại đời mới nhất với giá ưu đãi.</p>
                </div>
                <div class="absolute -bottom-24 -left-24 w-64 h-64 bg-white/5 rounded-full blur-3xl"></div>
            </section>

            <section class="w-full md:w-1/2 p-10 lg:p-16 bg-white">
                <div class="max-w-sm mx-auto">
                    <div class="flex bg-gray-100 p-1 rounded-xl mb-8" id="authTabs">
                        <button class="flex-1 bg-white shadow-sm text-gray-800 font-bold py-2.5 rounded-lg text-sm transition-soft" id="tabLogin">Đăng nhập</button>
                        <button class="flex-1 text-gray-500 font-semibold py-2.5 rounded-lg text-sm hover:text-gray-700 transition-soft" id="tabRegister">Đăng ký</button>
                    </div>

                    <!-- FORM ĐĂNG NHẬP -->
                    <form id="loginForm" class="space-y-6">
                        <h2 class="text-2xl font-bold text-gray-900 mb-6">Chào mừng trở lại</h2>
                        <div>
                            <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2">Email</label>
                            <input type="email" id="loginEmail" required placeholder="example@gmail.com" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-[#3451B2] outline-none text-sm bg-gray-50/30">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2">Mật khẩu</label>
                            <input type="password" id="loginPassword" required placeholder="••••••••" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-[#3451B2] outline-none text-sm bg-gray-50/30">
                        </div>
                        <button type="submit" class="w-full bg-[#3451B2] hover:bg-[#283e8a] text-white font-bold py-4 rounded-xl shadow-lg transition-soft transform active:scale-[0.98]">ĐĂNG NHẬP</button>
                    </form>

                    <!-- FORM ĐĂNG KÝ -->
                    <form id="registerForm" class="space-y-6 hidden">
                        <h2 class="text-2xl font-bold text-gray-900 mb-6">Tạo tài khoản mới</h2>
                        <div>
                            <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2">Họ và tên</label>
                            <input type="text" id="regName" required placeholder="Nguyễn Văn A" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-[#3451B2] outline-none text-sm bg-gray-50/30">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2">Email</label>
                            <input type="email" id="regEmail" required placeholder="example@gmail.com" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-[#3451B2] outline-none text-sm bg-gray-50/30">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2">Mật khẩu</label>
                            <input type="password" id="regPassword" required minlength="6" placeholder="Tối thiểu 6 ký tự" class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:border-[#3451B2] outline-none text-sm bg-gray-50/30">
                        </div>
                        <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-xl shadow-lg transition-soft transform active:scale-[0.98]">ĐĂNG KÝ NGAY</button>
                    </form>

                </div>
            </section>
        </div>
    </main>

    <script src="../assets/js/products_data.js"></script>
    <script src="../assets/js/api.js"></script>
    <script src="../assets/js/cart.js"></script>
    <script src="../assets/js/index.js"></script>
</body>
</html>
